<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto - SolarCity</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link id="theme-style" rel="stylesheet" href="assets/css/style-day.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<header class="topbar">
  <div class="logo">
    <a href="index.html">
      <img src="logo.png" alt="SolarCity" style="height:80px;">
    </a>
  </div>
  <nav class="menu">
    <a href="powerbanks.html">Powerbanks</a>
    <a href="paneles.html">Paneles</a>
    <a href="luces.html">Luces</a>
    <a href="contacto.html">Contacto</a>
  </nav>
</header>

<main class="product-page">

  <div class="product-container">

    <!-- LEVÁ ČÁST -->
    <div style="width:420px; max-width:100%;">

      <div class="product-image">
        <img id="p-img" src="" alt="" onclick="openLightbox(this.src)">
      </div>

      <div id="galerie" class="product-gallery"></div>

    </div>

    <!-- PRAVÁ ČÁST -->
    <div class="product-info">

      <h1 id="p-nazev" class="produkt-nazev" style="font-size:28px; margin-top:0;">
        Cargando...
      </h1>

      <div class="product-price" id="p-cena"></div>

      <div id="p-popis" class="product-description"></div>

      <div class="produkt-buttons">
        <button class="produkt-btn" onclick="window.location.href='contacto.html'">
          ORDENAR
        </button>
        <button class="produkt-info-btn" onclick="history.back()">
          VOLVER
        </button>
      </div>

    </div>

  </div>

  <section class="categorias">
    <h2>Categorías</h2>
    <div class="grid">
      <a class="card" href="powerbanks.html">Powerbanks</a>
      <a class="card" href="paneles.html">Paneles</a>
      <a class="card" href="luces.html">Luces</a>
      <a class="card" href="contacto.html">Contacto</a>
    </div>
  </section>

</main>

<div id="lightbox" onclick="closeLightbox()">
  <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const params = new URLSearchParams(window.location.search);
const slug = params.get("slug");

function openLightbox(src) {
  const lb = document.getElementById("lightbox");
  document.getElementById("lightbox-img").src = src;
  lb.style.display = "flex";
  setTimeout(() => lb.classList.add("show"), 10);
}

function closeLightbox() {
  const lb = document.getElementById("lightbox");
  lb.classList.remove("show");
  setTimeout(() => lb.style.display = "none", 250);
}

async function nactiDetail() {
  if (!slug) return;

  try {
    const resp = await fetch(`/data/productos/${slug}.json?t=${Date.now()}`);
    const data = await resp.json();

    document.getElementById("p-img").src = data.imagen;
    document.getElementById("p-nazev").textContent = data.nombre;
    document.getElementById("p-cena").textContent = data.precio;
    document.getElementById("p-popis").innerHTML = marked.parse(data.descripcion || "");

    const gal = document.getElementById("galerie");
    gal.innerHTML = "";

    if (data.galeria) {
      data.galeria.forEach(item => {
        const img = document.createElement("img");
        img.src = item.imagen;
        img.onclick = (e) => {
          e.stopPropagation();
          openLightbox(item.imagen);
        };
        gal.appendChild(img);
      });
    }

  } catch (e) {}
}

document.addEventListener("DOMContentLoaded", nactiDetail);
</script>

</body>
</html>
