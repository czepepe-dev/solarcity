<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto - SolarCity</title>
    <link id="theme-style" rel="stylesheet" href="assets/css/style-day.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .product-page { max-width: 1100px; margin: 40px auto; padding: 20px; }
        .product-container { display: flex; gap: 40px; flex-wrap: wrap; }
        .left-col { flex: 0 0 420px; max-width: 100%; }
        .product-image { width: 100%; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-image img { width: 100%; display: block; cursor: zoom-in; }
        .product-gallery { margin-top: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .product-gallery img { width: 100%; height: 80px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .product-info { flex: 1; min-width: 300px; }
        .product-price { font-size: 28px; color: #ff9800; font-weight: bold; margin: 20px 0; }
        #lightbox { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:9999; }
        #lightbox img { max-width:90%; max-height:90%; }
        .categorias-footer { margin-top: 60px; padding-top: 30px; border-top: 1px solid #eee; text-align: center; }
        .cat-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .cat-item { padding: 10px 20px; border: 1px solid #ddd; border-radius: 5px; text-decoration: none; color: inherit; font-weight: bold; }
        @media (max-width: 768px) { .left-col { flex: 1 1 100%; } }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="logo"><a href="index.html"><img src="logo.png" alt="SolarCity" style="height:80px;"></a></div>
        <nav class="menu">
            <a href="powerbanks.html">Powerbanks</a>
            <a href="paneles.html">Paneles</a>
            <a href="luces.html">Luces</a>
            <a href="contacto.html">Contacto</a>
        </nav>
    </header>

    <main class="product-page">
        <div class="product-container">
            <div class="left-col">
                <div class="product-image"><img id="p-img" src="" alt="" onclick="openLightbox(this.src)"></div>
                <div id="galerie" class="product-gallery"></div>
            </div>
            <div class="product-info">
                <h1 id="p-nazev" class="produkt-nazev" style="font-size: 32px; margin:0;">Cargando...</h1>
                <div id="p-cena" class="product-price"></div>
                <div id="p-popis" class="product-description"></div>
                <div class="produkt-buttons" style="margin-top: 30px;">
                    <button class="produkt-btn" style="height: 50px; padding: 0 30px;" onclick="window.location.href='contacto.html'">ORDENAR</button>
                    <button class="produkt-info-btn" style="height: 50px; padding: 0 20px;" onclick="history.back()">VOLVER</button>
                </div>
            </div>
        </div>

        <section class="categorias-footer">
            <h2>Categorías</h2>
            <div class="cat-grid">
                <a class="cat-item" href="powerbanks.html">Powerbanks</a>
                <a class="cat-item" href="paneles.html">Paneles</a>
                <a class="cat-item" href="luces.html">Luces</a>
                <a class="cat-item" href="contacto.html">Contacto</a>
            </div>
        </section>
    </main>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("slug");

        function openLightbox(src) {
            if(!src) return;
            document.getElementById("lb-img").src = src;
            document.getElementById("lightbox").style.display = "flex";
        }

        async function nactiDetail() {
            if (!slug) return;
            try {
                const resp = await fetch(`/data/productos/${slug}.json?t=${Date.now()}`);
                const data = await resp.json();
                document.getElementById("p-img").src = data.imagen;
                document.getElementById("p-nazev").textContent = data.nombre;
                document.getElementById("p-cena").textContent = data.precio;
                document.getElementById("p-popis").innerHTML = marked.parse(data.descripcion || "");

                const gal = document.getElementById("galerie");
                gal.innerHTML = "";
                if (data.galeria) {
                    data.galeria.forEach(item => {
                        const img = document.createElement("img");
                        img.src = item.imagen;
                        img.onclick = () => openLightbox(item.imagen);
                        gal.appendChild(img);
                    });
                }
            } catch (e) { console.error(e); }
        }
        document.addEventListener("DOMContentLoaded", nactiDetail);
    </script>
</body>
</html>
