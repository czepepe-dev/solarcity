<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto - Tecnología solar</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link id="theme-style" rel="stylesheet" href="assets/css/style-day.css">
  <style>
    .product-page { max-width: 1100px; margin: 40px auto; padding: 20px; }
    .product-container { display: flex; gap: 40px; flex-wrap: wrap; align-items: flex-start; }
    .product-image { width: 420px; overflow: hidden; border-radius: 10px; box-shadow: 0 0 10px #0002; }
    .product-image img { width: 100%; display: block; }
    .product-gallery { margin-top: 15px; width: 420px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .product-gallery img { width: 100%; height: 95px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform .25s ease; }
    .product-gallery img:hover { transform: scale(1.1); }
    .product-info { flex: 1; min-width: 300px; }
    .product-price { font-size: 32px; font-weight: 700; margin-bottom: 20px; color: #d62828; }
    .product-description { font-size: 14px; line-height: 1.5; margin-bottom: 30px; }
    
    /* Kontejner pro tlačítka v detailu */
    .btn-container { display: flex; gap: 10px; margin-top: 20px; }
    .btn-container button { flex: 1; }

    /* CATEGORÍAS GRID - Sjednocení s designem webu */
    .categorias { margin-top: 60px; border-top: 1px solid #eee; padding-top: 30px; }
    .categorias h2 { margin-bottom: 20px; font-size: 24px; }
    .categorias .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .categorias .card { 
      background: #f8f9fa; padding: 20px; text-align: center; border-radius: 8px; 
      text-decoration: none; color: #333; font-weight: bold; border: 1px solid #eee; transition: 0.3s;
    }
    .categorias .card:hover { background: #6ccf55; color: white; border-color: #6ccf55; }

    #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
    #lightbox-img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    
    footer { text-align: center; padding: 40px 20px; margin-top: 40px; border-top: 1px solid #eee; color: #666; }
    footer a { color: #666; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo"><a href="index.html"><img src="logo.png" alt="SolarCity" style="height:80px;"></a></div>
    <nav class="menu">
      <a href="powerbanks.html">Powerbanks</a>
      <a href="paneles.html">Paneles</a>
      <a href="luces.html">Luces</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <main class="product-page">
    <div class="product-container">
      <div>
        <div class="product-image"><img id="p-img" src="" alt=""></div>
        <div id="galerie" class="product-gallery"></div>
      </div>
      <div class="product-info">
        <h1 id="p-nazev">Cargando...</h1>
        <div class="product-price" id="p-cena"></div>
        <div class="product-description" id="p-popis"></div>
        
        <div class="btn-container">
          <button class="produkt-btn" onclick="window.location.href='contacto.html'">ORDENAR</button>
          <button class="produkt-info-btn" onclick="history.back()">DETALLES</button>
        </div>
      </div>
    </div>

    <section class="categorias">
      <h2>Categorías</h2>
      <div class="grid">
        <a class="card" href="powerbanks.html">Powerbanks</a>
        <a class="card" href="paneles.html">Paneles</a>
        <a class="card" href="luces.html">Luces</a>
        <a class="card" href="contacto.html">Contacto</a>
      </div>
    </section>
  </main>

  <footer>
    <p>
      <a href="https://solarcitycuba.netlify.app/admin/">Admin</a> © 2026 Tecnología solar
    </p>
  </footer>

  <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    async function nactiDetailProduktu() {
      if (!slug) return;
      try {
        const response = await fetch(`/data/productos/${slug}.json?t=${Date.now()}`);
        const data = await response.json();
        document.getElementById("p-img").src = data.imagen;
        document.getElementById("p-nazev").textContent = data.nombre;
        document.getElementById("p-cena").textContent = data.precio;
        document.getElementById("p-popis").innerHTML = data.descripcion || "";
        const gal = document.getElementById("galerie");
        gal.innerHTML = "";
        if (data.galeria) {
          data.galeria.forEach(item => {
            const img = document.createElement("img");
            img.src = item.imagen;
            img.onclick = () => { 
                document.getElementById("lightbox-img").src = item.imagen; 
                document.getElementById("lightbox").style.display = "flex"; 
            };
            gal.appendChild(img);
          });
        }
      } catch (err) {}
    }
    document.addEventListener("DOMContentLoaded", nactiDetailProduktu);
  </script>
</body>
</html>
